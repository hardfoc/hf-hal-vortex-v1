    category: "component"
    ci_enabled: true
  motor_controller_uart_test:
    source_file: "motor_controller_test.cpp"
    category: "component"
    ci_enabled: true
  encoder_imu_test:
    source_file: "encoder_imu_test.cpp"
    category: "component"
    ci_enabled: true
  led_temp_test:
    source_file: "led_temp_test.cpp"
    category: "component"
    ci_enabled: true

  vortex_led_ws2812_smoke:
    source_file: "vortex_led_ws2812_smoke.cpp"
    category: "component"
    ci_enabled: true
  vortex_led_ws2812_cycle:
